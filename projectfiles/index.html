<!DOCTYPE html>
<html>
<head>
    <title>Rainfall Prediction</title>
    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        .container {
            background: white;
            width: 350px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.3);
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Rainfall Prediction</h2>
        <form action="/predict" method="post">
            <input type="number" step="any" name="MinTemp" placeholder="Min Temperature" required>
            <input type="number" step="any" name="MaxTemp" placeholder="Max Temperature" required>
            <input type="number" step="any" name="Rainfall" placeholder="Rainfall (mm)" required>
            <button type="submit">Predict</button>
        </form>
    </div>
</body>
</html>
